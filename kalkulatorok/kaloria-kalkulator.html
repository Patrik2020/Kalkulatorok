<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Kalória kalkulátor</title>

    <meta name="description" content="Számold ki napi kalória szükségleted." />

    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header>
      <div class="logo">🧮 KalkulátorHub</div>

      <nav>
        <button onclick="goBack()" class="back-btn">← Vissza</button>
        <a href="../index.html">Főoldal</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>Kalória kalkulátor</h1>
        <p>Napi kalória szükséglet becslése.</p>
      </section>

      <section class="card">
        <div class="calc-grid">
          <div>
            <label>Testsúly (kg)</label>
            <input type="number" id="weightCal" />
          </div>

          <div>
            <label>Magasság (cm)</label>
            <input type="number" id="heightCal" />
          </div>

          <div>
            <label>Életkor</label>
            <input type="number" id="age" />
          </div>
        </div>

        <button onclick="calculateCalories()">Számol</button>

        <div class="result-box">
          <p>Eredmény:</p>
          <p id="result-value">–</p>
        </div>
      </section>

      <section class="article">
        <h2>Kalória szükséglet</h2>
        <p>
          A napi kalóriaigény függ a testsúlytól, magasságtól és életkortól.
        </p>
      </section>
    </main>

    <footer>
      <p>© 2026 KalkulátorHub</p>
    </footer>

    <script src="../js/kalkulator.js"></script>
  </body>
</html>
