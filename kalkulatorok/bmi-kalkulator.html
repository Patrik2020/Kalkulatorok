<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI kalkulátor</title>
    <meta name="description" content="Számold ki a testtömeg indexed (BMI)." />
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header>
      <div class="logo">🧮 KalkulátorHub</div>

      <nav>
        <button onclick="goBack()" class="back-btn">← Vissza</button>
        <a href="../index.html">Főoldal</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>BMI kalkulátor</h1>
        <p>Számold ki a testtömeg indexed.</p>
      </section>

      <section class="card">
        <div class="calc-grid">
          <div>
            <label>Testsúly (kg)</label>
            <input type="number" id="weight" />
          </div>

          <div>
            <label>Magasság (cm)</label>
            <input type="number" id="height" />
          </div>
        </div>

        <button onclick="calculateBMI()">Számol</button>

        <div class="result-box">
          <p>Eredmény:</p>
          <p id="result-value">–</p>
        </div>
      </section>

      <section class="article">
        <h2>Mi az a BMI?</h2>
        <p>
          A BMI a testtömeg index, amely segít megállapítani, hogy a testsúlyod
          egészséges tartományban van-e.
        </p>
      </section>
    </main>

    <footer>
      <p>© 2026 KalkulátorHub</p>
    </footer>

    <script src="../js/kalkulator.js"></script>
  </body>
</html>
