<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Üzemanyag kalkulátor</title>

    <meta name="description" content="Számold ki autód fogyasztását." />

    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header>
      <div class="logo">🧮 KalkulátorHub</div>

      <nav>
        <button onclick="goBack()" class="back-btn">← Vissza</button>
        <a href="../index.html">Főoldal</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>Üzemanyag kalkulátor</h1>
        <p>Autó fogyasztás számítása.</p>
      </section>

      <section class="card">
        <div class="calc-grid">
          <div>
            <label>Távolság (km)</label>
            <input type="number" id="distance" />
          </div>

          <div>
            <label>Fogyasztás (l/100km)</label>
            <input type="number" id="consumption" />
          </div>
        </div>

        <button onclick="calculateFuel()">Számol</button>

        <div class="result-box">
          <p>Eredmény:</p>
          <p id="result-value">–</p>
        </div>
      </section>

      <section class="article">
        <h2>Fogyasztás számítás</h2>
        <p>
          A fogyasztás megmutatja, mennyi üzemanyagot használ az autó adott
          távolságon.
        </p>
      </section>
    </main>

    <footer>
      <p>© 2026 KalkulátorHub</p>
    </footer>

    <script src="../js/kalkulator.js"></script>
  </body>
</html>
